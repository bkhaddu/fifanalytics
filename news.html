<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>FIFA Analytics 2026 | Latest Updates</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&amp;family=Work+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#ffffff",
                    "on-surface": "#f3eedd",
                    "primary-container": "#0044cc",
                    "inverse-primary": "#1b62db",
                    "background": "#000000",
                    "on-primary-container": "#ffffff",
                    "on-primary-fixed": "#ffffff",
                    "on-error-container": "#ffdad6",
                    "on-tertiary-fixed": "#ffffff",
                    "on-secondary-fixed": "#ffffff",
                    "surface-dim": "#0a0f1d",
                    "primary-fixed": "#3385ff",
                    "tertiary-container": "#e5e5e5",
                    "error": "#ffb4ab",
                    "surface-container-lowest": "#020617",
                    "tertiary-fixed-dim": "#cccccc",
                    "surface-tint": "#0066ff",
                    "on-surface-variant": "#a8a295",
                    "secondary-fixed-dim": "#ef4444",
                    "secondary-container": "#b91c1c",
                    "surface-container-highest": "#111827",
                    "on-tertiary-container": "#ef4444",
                    "on-background": "#ffffff",
                    "secondary-fixed": "#ef4444",
                    "primary": "#0066ff",
                    "surface-container-low": "#0b1329",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#1e1e1e",
                    "surface-container-high": "#1f2937",
                    "on-secondary-fixed-variant": "#ffffff",
                    "inverse-surface": "#ffffff",
                    "surface": "#030712",
                    "tertiary": "#ffffff",
                    "tertiary-fixed": "#ffffff",
                    "on-primary-fixed-variant": "#ffffff",
                    "on-error": "#690005",
                    "primary-fixed-dim": "#0052cc",
                    "on-tertiary-fixed-variant": "#ffffff",
                    "error-container": "#93000a",
                    "on-secondary-container": "#ffffff",
                    "secondary": "#ef4444",
                    "outline": "#1f2937",
                    "surface-container": "#0f172a",
                    "surface-variant": "#1e293b",
                    "surface-bright": "#1e293b",
                    "outline-variant": "#334155",
                    "on-secondary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "24px",
                    "base": "8px",
                    "xl": "80px",
                    "md": "24px",
                    "xs": "4px",
                    "sm": "12px",
                    "lg": "48px",
                    "container-max": "1280px"
            },
            "fontFamily": {
                    "body-md": ["Work Sans"],
                    "stats-numeric": ["Work Sans"],
                    "display-sm": ["Sora"],
                    "label-caps": ["Work Sans"],
                    "body-lg": ["Work Sans"],
                    "headline-lg-mobile": ["Sora"],
                    "headline-lg": ["Sora"],
                    "display-lg": ["Sora"],
                    "headline-md": ["Sora"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "stats-numeric": ["20px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "display-sm": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "display-lg": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        .glass-panel {
            background: rgba(11, 19, 41, 0.6);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .live-pulse {
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .scrolling-touch {
            -webkit-overflow-scrolling: touch;
        }
        .stadium-glow {
            background: radial-gradient(circle at 50% -20%, rgba(0, 102, 255, 0.15) 0%, transparent 60%);
        }
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="font-body-md text-body-md overflow-x-hidden">
    <!-- Header / Top Bar (Mobile Optimized) -->
    <header class="fixed top-0 left-0 w-full z-50 glass-panel px-gutter h-16 flex items-center justify-between">
        <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
            <img src="logo.png" class="w-8 h-8 object-contain" alt="FIFA Analytics Logo"/>
            <h1 class="font-display-sm text-headline-md text-primary uppercase tracking-tighter font-bold">FIFA Analytics</h1>
        </div>
        
        <!-- Search bar container -->
        <div class="flex items-center gap-2 flex-1 max-w-[200px] justify-end">
            <input type="text" id="news-search" placeholder="Search news..." class="hidden sm:block w-full bg-white/5 border border-white/10 rounded-xl text-xs px-3 py-1.5 text-white placeholder-on-surface-variant focus:outline-none focus:border-primary transition-all"/>
            <button onclick="toggleSearchBar()" class="text-on-surface p-1 rounded-full hover:bg-white/5 active:scale-95 transition-all">
                <span class="material-symbols-outlined text-[20px]" id="search-icon">search</span>
            </button>
        </div>
    </header>

    <main class="pt-16 pb-24 min-h-screen stadium-glow">
        <!-- Search bar expanding on mobile -->
        <div id="search-expand-mobile" class="hidden w-full px-4 py-2 bg-background/90 border-b border-white/5 sticky top-16 z-40">
            <input type="text" id="news-search-mobile" placeholder="Search stories..." class="w-full bg-white/5 border border-white/10 rounded-xl text-sm px-4 py-2 text-white placeholder-on-surface-variant focus:outline-none focus:border-primary"/>
        </div>

        <!-- Trending Hashtags Section -->
        <section class="py-4 overflow-x-auto whitespace-nowrap scrolling-touch px-gutter no-scrollbar">
            <div class="flex gap-2" id="tags-container">
                <button onclick="filterByTag('#WORLD_CUP')" class="px-4 py-2 bg-primary text-on-primary rounded-full font-label-caps text-label-caps flex items-center gap-1 active:scale-95 transition-all">
                    #WORLD_CUP
                </button>
                <button onclick="filterByTag('#ANNOUNCEMENT')" class="px-4 py-2 glass-panel text-on-surface rounded-full font-label-caps text-label-caps border border-white/10 active:scale-95 transition-all">
                    #ANNOUNCEMENT
                </button>
                <button onclick="filterByTag('#TRANSFER')" class="px-4 py-2 glass-panel text-on-surface rounded-full font-label-caps text-label-caps border border-white/10 active:scale-95 transition-all">
                    #TRANSFER
                </button>
                <button onclick="filterByTag('#PREVIEW')" class="px-4 py-2 glass-panel text-on-surface rounded-full font-label-caps text-label-caps border border-white/10 active:scale-95 transition-all">
                    #PREVIEW
                </button>
            </div>
        </section>

        <!-- Loading spinner -->
        <div id="news-loader" class="flex flex-col items-center justify-center py-16 gap-3">
            <div class="w-8 h-8 rounded-full border-2 border-primary border-t-transparent animate-spin"></div>
            <p class="font-label-caps text-[11px] text-primary tracking-widest">LOADING LIVE UPDATES...</p>
        </div>

        <!-- Featured Story (Hero Card) -->
        <section class="px-gutter mb-8 hidden" id="featured-section">
            <div id="hero-card-container">
                <!-- Injected dynamically -->
            </div>
        </section>

        <!-- Breaking News Vertical Feed -->
        <section class="px-gutter space-y-6 hidden" id="feed-section">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-headline-md text-headline-md text-white">Latest Headlines</h3>
                <span id="news-count" class="font-label-caps text-on-surface-variant text-[11px]">0 ARTICLES</span>
            </div>
            
            <div class="space-y-4" id="articles-container">
                <!-- Injected dynamically -->
            </div>
        </section>
    </main>

    <!-- Bottom Navigation Bar (Shared Component) -->
    <nav class="fixed bottom-0 left-0 w-full md:bottom-6 md:left-1/2 md:-translate-x-1/2 md:max-w-md md:rounded-2xl z-40 flex justify-around items-center px-4 py-3 bg-surface-container-low/80 backdrop-blur-lg border-t md:border border-white/10 rounded-t-xl shadow-lg">
        <a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors" href="index.html">
            <span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
            <span class="font-label-caps text-label-caps mt-0.5">Standings</span>
        </a>
        <a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full p-2 px-4 active:scale-90 transition-transform" href="news.html">
            <span class="material-symbols-outlined" data-icon="news" style="font-variation-settings: 'FILL' 1;">news</span>
            <span class="font-label-caps text-label-caps mt-0.5">News</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors" href="recaps.html">
            <span class="material-symbols-outlined" data-icon="play_circle">play_circle</span>
            <span class="font-label-caps text-label-caps mt-0.5">Recaps</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors" href="predict.html">
            <span class="material-symbols-outlined" data-icon="insights">insights</span>
            <span class="font-label-caps text-label-caps mt-0.5">Predict</span>
        </a>
    </nav>

    <script>
        let allArticles = [];
        let filteredArticles = [];
        let activeTag = "";

        // Standard fallback dataset if API/converter fails
        const fallbackNews = [
            {
                title: "Road to the Finals: Who will claim the Cup in 2026?",
                description: "With training sessions starting and team selections wrapping up, we analyze the top contenders preparing for kickoff at the Unity Arena.",
                link: "https://www.fifa.com",
                pubDate: "2026-06-09 12:00:00",
                enclosure: { link: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=800&auto=format&fit=crop" },
                categories: ["World Cup"]
            },
            {
                title: "FIFA announces new stadium cooling technology for 2026 host cities",
                description: "A breakthrough system will maintain pitch temperatures at a cool 21°C regardless of external weather conditions.",
                link: "https://www.fifa.com",
                pubDate: "2026-06-09 10:00:00",
                enclosure: { link: "https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?q=80&w=800&auto=format&fit=crop" },
                categories: ["Announcement"]
            },
            {
                title: "Mexico National Team begins training camp in Mexico City",
                description: "The host country gathers its main star players for an intense tactical camp under high altitude settings.",
                link: "https://www.fifa.com",
                pubDate: "2026-06-09 08:00:00",
                enclosure: { link: "https://images.unsplash.com/photo-1518063319789-7217e6706b04?q=80&w=800&auto=format&fit=crop" },
                categories: ["Contenders"]
            }
        ];

        async function fetchNews() {
            const loader = document.getElementById("news-loader");
            const featured = document.getElementById("featured-section");
            const feed = document.getElementById("feed-section");

            loader.classList.remove("hidden");
            featured.classList.add("hidden");
            feed.classList.add("hidden");

            try {
                const rssUrl = "https://www.skysports.com/rss/12040";
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
                const data = await response.json();
                
                if (data && data.status === "ok" && data.items && data.items.length > 0) {
                    allArticles = data.items.map(item => ({
                        title: item.title,
                        description: item.description || item.content || "No description available.",
                        link: item.link,
                        pubDate: item.pubDate,
                        enclosure: { 
                            link: item.enclosure && item.enclosure.link ? item.enclosure.link : "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=800&auto=format&fit=crop"
                        },
                        categories: item.categories || ["Soccer"]
                    }));
                } else {
                    allArticles = fallbackNews;
                }
            } catch (error) {
                console.error("Error loading news feed:", error);
                allArticles = fallbackNews;
            } finally {
                filteredArticles = [...allArticles];
                loader.classList.add("hidden");
                featured.classList.remove("hidden");
                feed.classList.remove("hidden");
                renderNews();
            }
        }

        function renderNews() {
            const countLabel = document.getElementById("news-count");
            countLabel.textContent = `${filteredArticles.length} ARTICLES`;

            // Render Hero Card
            const heroContainer = document.getElementById("hero-card-container");
            heroContainer.innerHTML = "";
            
            if (filteredArticles.length > 0) {
                const hero = filteredArticles[0];
                const cleanDesc = hero.description.replace(/<[^>]*>/g, '');
                
                heroContainer.innerHTML = `
                    <a href="${hero.link}" target="_blank" class="block relative w-full aspect-[16/10] md:aspect-[21/9] rounded-xl overflow-hidden shadow-2xl group active:scale-[0.98] transition-transform">
                        <img alt="Featured News" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" src="${hero.enclosure.link}"/>
                        <div class="absolute inset-0 bg-gradient-to-t from-background via-background/30 to-transparent"></div>
                        <div class="absolute top-4 left-4">
                            <span class="inline-flex items-center gap-2 px-3 py-1 bg-error rounded-full text-on-error font-label-caps text-label-caps live-pulse">
                                <span class="w-2 h-2 rounded-full bg-on-error animate-ping"></span> HOT STORY
                            </span>
                        </div>
                        <div class="absolute bottom-6 left-6 right-6">
                            <p class="text-primary font-label-caps text-label-caps mb-2 tracking-widest">${(hero.categories[0] || 'SOCCER').toUpperCase()}</p>
                            <h2 class="font-headline-lg-mobile text-[22px] md:text-headline-lg text-white leading-tight mb-3">${hero.title}</h2>
                            <p class="text-on-surface-variant text-[13px] line-clamp-2 mb-3">${cleanDesc}</p>
                            <div class="flex items-center gap-3">
                                <span class="text-on-surface-variant text-[11px]">${formatDate(hero.pubDate)}</span>
                            </div>
                        </div>
                    </a>
                `;
            }

            // Render List Feed
            const articlesContainer = document.getElementById("articles-container");
            articlesContainer.innerHTML = "";

            const remainingArticles = filteredArticles.slice(1);
            if (remainingArticles.length === 0) {
                if (filteredArticles.length === 0) {
                    articlesContainer.innerHTML = `<p class="text-center text-on-surface-variant py-8 font-label-caps">No matching stories found</p>`;
                }
                return;
            }

            remainingArticles.forEach(article => {
                const cleanDesc = article.description.replace(/<[^>]*>/g, '');
                const card = document.createElement("a");
                card.href = article.link;
                card.target = "_blank";
                card.className = "glass-panel p-4 rounded-xl flex gap-4 active:bg-surface-container-highest transition-all hover:border-primary/20 border border-transparent block";
                
                card.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <span class="text-primary font-label-caps text-[9px] tracking-widest mb-1 block">${(article.categories[0] || 'NEWS').toUpperCase()}</span>
                        <h4 class="font-bold text-[14px] text-on-surface mb-2 leading-snug line-clamp-2">${article.title}</h4>
                        <p class="text-[12px] text-on-surface-variant line-clamp-2 mb-2">${cleanDesc}</p>
                        <span class="text-on-surface-variant text-[10px]">${formatDate(article.pubDate)}</span>
                    </div>
                    <div class="w-20 h-20 rounded-lg overflow-hidden flex-shrink-0 bg-surface-container-highest">
                        <img alt="Thumbnail" class="w-full h-full object-cover" src="${article.enclosure.link}"/>
                    </div>
                `;
                articlesContainer.appendChild(card);
            });
        }

        // Relative time helper
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr.replace(/-/g, "/"));
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMins / 60);

                if (diffMins < 60) {
                    return `${diffMins <= 0 ? 1 : diffMins} mins ago`;
                } else if (diffHours < 24) {
                    return `${diffHours} hours ago`;
                } else {
                    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                }
            } catch (e) {
                return dateStr;
            }
        }

        // Search features
        function toggleSearchBar() {
            const searchDesktop = document.getElementById("news-search");
            const searchMobile = document.getElementById("search-expand-mobile");
            const icon = document.getElementById("search-icon");

            if (window.innerWidth >= 640) {
                searchDesktop.classList.toggle("hidden");
                searchDesktop.focus();
            } else {
                searchMobile.classList.toggle("hidden");
                document.getElementById("news-search-mobile").focus();
            }
        }

        function filterNews(query) {
            const lower = query.toLowerCase();
            filteredArticles = allArticles.filter(art => 
                art.title.toLowerCase().includes(lower) || 
                art.description.toLowerCase().includes(lower)
            );
            renderNews();
        }

        // Keyword filter features
        function filterByTag(tag) {
            const buttons = document.querySelectorAll("#tags-container button");
            buttons.forEach(btn => {
                if (btn.textContent.trim() === tag) {
                    btn.className = "px-4 py-2 bg-primary text-on-primary rounded-full font-label-caps text-label-caps flex items-center gap-1 active:scale-95 transition-all";
                } else {
                    btn.className = "px-4 py-2 glass-panel text-on-surface rounded-full font-label-caps text-label-caps border border-white/10 active:scale-95 transition-all";
                }
            });

            const queryWord = tag.replace('#', '').toLowerCase();
            filteredArticles = allArticles.filter(art =>
                art.title.toLowerCase().includes(queryWord) ||
                art.description.toLowerCase().includes(queryWord) ||
                (art.categories && art.categories.some(c => c.toLowerCase().includes(queryWord)))
            );
            renderNews();
        }

        document.getElementById("news-search").addEventListener("input", (e) => filterNews(e.target.value));
        document.getElementById("news-search-mobile").addEventListener("input", (e) => filterNews(e.target.value));

        // Initialize Page
        fetchNews();
    </script>
</body>
</html>
